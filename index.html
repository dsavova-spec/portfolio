<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Viewer</title>

  <style>
    /* Премахваме абсолютно всички полета и скриваме скрола на самия уебсайт */
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #222; /* Тъмен фон около PDF-а */
    }

    /* Нагласяме рамката да заема абсолютно целия екран, без рамки */
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>

<body>

  <iframe src="Portfolio-Savova-Diana-2026.pdf#toolbar=0&navpanes=0&scrollbar=0&view=Fit&pageLayout=SinglePage"></iframe>

</body>
</html>
