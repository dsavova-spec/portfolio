<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #controls {
      background: #1c1c1c;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
      color: white;
      z-index: 20;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #333;
      color: white;
    }

    button:hover {
      background: #555;
    }

    #viewer {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #222;
      overflow: hidden;
    }

    /* 🔥 Нов контейнер, който ще държи заедно платното и линковете */
    #page-container {
      position: relative;
    }

    canvas {
      display: block;
      box-shadow: 0 0 15px rgba(0,0,0,0.5); /* Добавена сянка за стил */
    }

    /* Слой за линковете - вече покрива точно платното, а не целия екран */
    #link-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    #pageInfo {
      margin: 0 10px;
      min-width: 80px;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="controls">
  <button onclick="prevPage()">⬅ Назад</button>
  <span id="pageInfo">Зареждане...</span>
  <button onclick="nextPage()">Напред ➡</button>
  <button onclick="toggleFull()">На цял екран</button>
</div>

<div id="viewer">
  <div id="page-container">
    <canvas id="pdf-canvas"></canvas>
    <div id="link-layer"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
// 1. ЗАДЪЛЖИТЕЛНО: Указваме къде се намира Worker скрипта!
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const url = "Portfolio-Savova-Diana-2026.pdf";

let pdfDoc = null;
let pageNum = 1;

const canvas = document.getElementById("pdf-canvas");
const ctx = canvas.getContext("2d");
const linkLayer = document.getElementById("link-layer");
const pageContainer = document.getElementById("page-container");
const pageInfo = document.getElementById("pageInfo");

// Зареждаме PDF файла с обработка на грешки
const loadingTask = pdfjsLib.getDocument({
  url: url,
  // Използваме числото 2 (което в PDF.js се равнява на BLANK), за да отваря в нов таб
  externalLinkTarget: 2, 
  ignoreDestinationZoom: true
});

loadingTask.promise.then(pdf => {
  pdfDoc = pdf;
  renderPage(pageNum);
}).catch(err => {
  console.error("Грешка при зареждане:", err);
  pageInfo.textContent = "Грешка!";
});

// Автоматичен мащаб
function getScale(page) {
  const viewport = page.getViewport({ scale: 1 });
  const maxWidth = window.innerWidth;
  // Вадим 60px заради менюто горе + малко отстояние
  const maxHeight = window.innerHeight - 80; 

  return Math.min(
    maxWidth / viewport.width,
    maxHeight / viewport.height
  );
}

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    const scale = getScale(page);
    const viewport = page.getViewport({ scale });

    canvas.width = viewport.width;
    canvas.height = viewport.height;
    
    // Задаваме същите размери на контейнера, за да може линковете да са точни
    pageContainer.style.width = viewport.width + "px";
    pageContainer.style.height = viewport.height + "px";

    const renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };

    page.render(renderContext);

    // Изчистваме старите линкове
    linkLayer.innerHTML = "";

    // Изграждаме невидимите линкове от PDF-а
    page.getAnnotations().then(annotations => {
      annotations.forEach(ann => {
        if (!ann.url) return;

        const a = document.createElement("a");
        a.href = ann.url;
        a.target = "_blank"; // Гарантира отваряне в нов раздел

        const rect = viewport.convertToViewportRectangle(ann.rect);

        const x = Math.min(rect[0], rect[2]);
        const y = Math.min(rect[1], rect[3]);
        const w = Math.abs(rect[0] - rect[2]);
        const h = Math.abs(rect[1] - rect[3]);

        a.style.position = "absolute";
        a.style.left = x + "px";
        a.style.top = y + "px";
        a.style.width = w + "px";
        a.style.height = h + "px";
        a.style.cursor = "pointer";
        
        // Съвет: Ако искаш да видиш дали линковете са на правилното място,
        // махни наклонените черти на долния ред:
        // a.style.backgroundColor = "rgba(255, 0, 0, 0.3)";

        linkLayer.appendChild(a);
      });
    });

    pageInfo.textContent = `Слайд ${num} / ${pdfDoc.numPages}`;
    pageNum = num;
  });
}

function nextPage() {
  if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
  renderPage(pageNum + 1);
}

function prevPage() {
  if (!pdfDoc || pageNum <= 1) return;
  renderPage(pageNum - 1);
}

function toggleFull() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// Преоразмеряване при завъртане или промяна на прозореца
window.addEventListener("resize", () => {
  if(pdfDoc) {
    renderPage(pageNum);
  }
});
</script>

</body>
</html>
