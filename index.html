<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      /* Гарантираме, че страницата няма да се скролва */
      overflow: hidden; 
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #controls {
      background: #1c1c1c;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
      color: white;
      z-index: 20;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #333;
      color: white;
    }

    button:hover {
      background: #555;
    }

    #viewer {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #222;
      /* Премахваме скрола вътре в самия четец */
      overflow: hidden; 
    }

    /* Контейнер, който обединява картинката и линковете */
    #page-container {
      position: relative;
    }

    canvas {
      display: block;
      box-shadow: 0 0 15px rgba(0,0,0,0.5); /* Добавяме лека сянка за красота */
    }

    /* Слоят с невидимите линкове */
    #link-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    #pageInfo {
      margin: 0 10px;
      min-width: 90px;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="controls">
  <button onclick="prevPage()">⬅ Назад</button>
  <span id="pageInfo">Loading...</span>
  <button onclick="nextPage()">Напред ➡</button>
  <button onclick="toggleFull()">Fullscreen</button>
</div>

<div id="viewer">
  <div id="page-container">
    <canvas id="pdf-canvas"></canvas>
    <div id="link-layer"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
// ЗАДЪЛЖИТЕЛНО: Указваме Worker-а, за да зарежда бързо и без грешки
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const url = "Portfolio-Savova-Diana-2026.pdf";

let pdfDoc = null;
let pageNum = 1;

const canvas = document.getElementById("pdf-canvas");
const ctx = canvas.getContext("2d");
const pageContainer = document.getElementById("page-container");
const linkLayer = document.getElementById("link-layer");

const loadingTask = pdfjsLib.getDocument({
  url: url,
  externalLinkTarget: 2 // 2 означава BLANK (отваряне в нов прозорец)
});

loadingTask.promise.then(pdf => {
  pdfDoc = pdf;
  renderPage(pageNum);
}).catch(err => {
  console.error("Грешка:", err);
  document.getElementById("pageInfo").textContent = "Грешка!";
});

function getScale(page) {
  const viewport = page.getViewport({ scale: 1 });
  const maxWidth = window.innerWidth;
  const maxHeight = window.innerHeight - 60; // 60px заради менюто горе

  return Math.min(
    maxWidth / viewport.width,
    maxHeight / viewport.height
  );
}

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    const scale = getScale(page);
    const viewport = page.getViewport({ scale });

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    // Нагласяме контейнера да е със същия размер като слайда
    pageContainer.style.width = viewport.width + "px";
    pageContainer.style.height = viewport.height + "px";

    const renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };

    page.render(renderContext);

    // ИЗГРАЖДАНЕ НА ЛИНКОВЕТЕ
    linkLayer.innerHTML = ""; 
    
    page.getAnnotations().then(annotations => {
      annotations.forEach(ann => {
        if (ann.subtype !== 'Link') return;

        const rect = viewport.convertToViewportRectangle(ann.rect);
        const x = Math.min(rect[0], rect[2]);
        const y = Math.min(rect[1], rect[3]);
        const w = Math.abs(rect[0] - rect[2]);
        const h = Math.abs(rect[1] - rect[3]);

        const a = document.createElement("a");
        a.style.position = "absolute";
        a.style.left = x + "px";
        a.style.top = y + "px";
        a.style.width = w + "px";
        a.style.height = h + "px";
        a.style.cursor = "pointer";

        if (ann.url) {
          // ВЪНШНИ ЛИНКОВЕ
          a.href = ann.url;
          a.target = "_blank"; // Гарантира нов раздел
        } else if (ann.dest) {
          // ВЪТРЕШНИ ЛИНКОВЕ
          a.onclick = (e) => {
            e.preventDefault();
            if (typeof ann.dest === 'string') {
              pdfDoc.getDestination(ann.dest).then(destArray => {
                pdfDoc.getPageIndex(destArray[0]).then(pageIndex => {
                  renderPage(pageIndex + 1);
                });
              });
            } else if (Array.isArray(ann.dest)) {
              pdfDoc.getPageIndex(ann.dest[0]).then(pageIndex => {
                renderPage(pageIndex + 1);
              });
            }
          };
        }

        linkLayer.appendChild(a);
      });
    });

    document.getElementById("pageInfo").textContent = `Page ${num} / ${pdfDoc.numPages}`;
    pageNum = num;
  });
}

function nextPage() {
  if (pageNum >= pdfDoc.numPages) return;
  renderPage(pageNum + 1);
}

function prevPage() {
  if (pageNum <= 1) return;
  renderPage(pageNum - 1);
}

function toggleFull() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

window.addEventListener("resize", () => {
  if (pdfDoc) {
    renderPage(pageNum);
  }
});
</script>

</body>
</html>
