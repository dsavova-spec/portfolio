<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #controls {
      background: #1c1c1c;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
      color: white;
      z-index: 20;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #333;
      color: white;
    }

    button:hover {
      background: #555;
    }

    #viewer {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #222;
      overflow: auto;
    }

    canvas {
      display: block;
    }

    /* 🔥 link layer (for clickable PDF links) */
    #link-layer {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
    }

    #pageInfo {
      margin: 0 10px;
    }
  </style>
</head>

<body>

<div id="controls">
  <button onclick="prevPage()">⬅ Назад</button>
  <span id="pageInfo">Loading...</span>
  <button onclick="nextPage()">Напред ➡</button>
  <button onclick="toggleFull()">Fullscreen</button>
</div>

<div id="viewer">
  <canvas id="pdf-canvas"></canvas>
  <div id="link-layer"></div>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const url = "Portfolio-Savova-Diana-2026.pdf";

let pdfDoc = null;
let pageNum = 1;

const canvas = document.getElementById("pdf-canvas");
const ctx = canvas.getContext("2d");
const linkLayer = document.getElementById("link-layer");

// 🔥 load PDF with proper link handling
const loadingTask = pdfjsLib.getDocument({
  url: url,
  externalLinkTarget: pdfjsLib.LinkTarget.BLANK,
  ignoreDestinationZoom: true
});

loadingTask.promise.then(pdf => {
  pdfDoc = pdf;
  renderPage(pageNum);
});

// 📏 auto-fit scale
function getScale(page) {
  const viewport = page.getViewport({ scale: 1 });

  const maxWidth = window.innerWidth;
  const maxHeight = window.innerHeight - 60;

  return Math.min(
    maxWidth / viewport.width,
    maxHeight / viewport.height
  );
}

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    const scale = getScale(page);
    const viewport = page.getViewport({ scale });

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    const renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };

    page.render(renderContext);

    // 🔥 clear old links
    linkLayer.innerHTML = "";

    // 🔥 build clickable annotation layer
    page.getAnnotations().then(annotations => {

      annotations.forEach(ann => {
        if (!ann.url) return;

        const a = document.createElement("a");
        a.href = ann.url;
        a.target = "_blank";

        const rect = viewport.convertToViewportRectangle(ann.rect);

        const x = Math.min(rect[0], rect[2]);
        const y = Math.min(rect[1], rect[3]);
        const w = Math.abs(rect[0] - rect[2]);
        const h = Math.abs(rect[1] - rect[3]);

        a.style.position = "absolute";
        a.style.left = x + "px";
        a.style.top = y + "px";
        a.style.width = w + "px";
        a.style.height = h + "px";

        a.style.cursor = "pointer";

        linkLayer.appendChild(a);
      });
    });

    document.getElementById("pageInfo").textContent =
      `Page ${num} / ${pdfDoc.numPages}`;

    pageNum = num;
  });
}

function nextPage() {
  if (pageNum >= pdfDoc.numPages) return;
  renderPage(pageNum + 1);
}

function prevPage() {
  if (pageNum <= 1) return;
  renderPage(pageNum - 1);
}

function toggleFull() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

window.addEventListener("resize", () => {
  renderPage(pageNum);
});
</script>

</body>
</html>
