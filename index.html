<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Портфолио на Диана Савова</title>

  <style>
    /* Премахваме празните полета и спираме главния скрол */
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Лентата с бутоните */
    #controls {
      background: #1c1c1c;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      border: none;
      background: #333;
      color: white;
      border-radius: 6px;
      font-size: 14px;
    }

    button:hover {
      background: #555;
    }

    /* Контейнерът, в който стои самият PDF */
    #viewer {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden; /* Забраняваме всякакъв скрол */
      background: #222;
      position: relative;
      padding: 10px; /* Малко въздух около страницата */
      box-sizing: border-box;
    }

    canvas {
      /* Сянка за красота, за да изглежда като лист хартия */
      box-shadow: 0 0 20px rgba(0,0,0,0.8); 
    }

    #pageInfo {
      color: white;
      margin: 0 10px;
      min-width: 80px;
      text-align: center;
    }

    #error-msg {
      color: #ff5555;
      position: absolute;
      text-align: center;
      padding: 20px;
      display: none;
    }
  </style>
</head>

<body>

<div id="controls">
  <button onclick="prevPage()">⬅ Назад</button>
  <span id="pageInfo">Зареждане...</span>
  <button onclick="nextPage()">Напред ➡</button>
  <button onclick="toggleFull()">Цял екран</button>
</div>

<div id="viewer">
  <div id="error-msg">Не мога да заредя PDF файла.<br>Ако си на компютъра си (file:///), браузърът го блокира. Качи го в GitHub!</div>
  <canvas id="pdf-canvas"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
// Указваме къде се намира Worker скрипта
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const url = "Portfolio-Savova-Diana-2026.pdf"; // Името трябва да съвпада точно!

let pdfDoc = null;
let pageNum = 1;

const canvas = document.getElementById("pdf-canvas");
const ctx = canvas.getContext("2d");
const pageInfo = document.getElementById("pageInfo");
const errorMsg = document.getElementById("error-msg");
const viewer = document.getElementById("viewer");

// Зареждаме документа
pdfjsLib.getDocument(url).promise.then(pdf => {
  pdfDoc = pdf;
  pageInfo.textContent = `1 / ${pdf.numPages}`;
  renderPage(pageNum);
}).catch(err => {
  console.error("Грешка при зареждане на PDF:", err);
  pageInfo.textContent = "Грешка";
  errorMsg.style.display = "block";
});

// Функцията, която рисува страницата и изчислява точния мащаб
function renderPage(num) {
  pdfDoc.getPage(num).then(page => {
    
    // Взимаме оригиналните размери на PDF страницата
    const unscaledViewport = page.getViewport({ scale: 1.0 });

    // Взимаме размерите на празното място на екрана, където ще стои PDF-а
    const containerWidth = viewer.clientWidth - 20; 
    const containerHeight = viewer.clientHeight - 20;

    // Изчисляваме мащаба така, че страницата да се побере изцяло без скролиране
    const scaleX = containerWidth / unscaledViewport.width;
    const scaleY = containerHeight / unscaledViewport.height;
    const fitScale = Math.min(scaleX, scaleY); // Взимаме по-малкия мащаб

    // Прилагаме новия изчислен мащаб
    const viewport = page.getViewport({ scale: fitScale });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    const renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };

    page.render(renderContext);
    pageInfo.textContent = `${num} / ${pdfDoc.numPages}`;
  });
}

// Навигация
function nextPage() {
  if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
  pageNum++;
  renderPage(pageNum);
}

function prevPage() {
  if (!pdfDoc || pageNum <= 1) return;
  pageNum--;
  renderPage(pageNum);
}

// Режим на цял екран
function toggleFull() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// Ако потребителят промени размера на прозореца, преоразмеряваме страницата автоматично
window.addEventListener('resize', () => {
  if (pdfDoc) {
    renderPage(pageNum);
  }
});
</script>

</body>
</html>
