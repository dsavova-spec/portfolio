<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Портфолио на Диана Савова</title>

  <style>
    /* Премахваме празните полета и спираме главния скрол */
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Лентата с бутоните */
    #controls {
      background: #1c1c1c;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      border: none;
      background: #333;
      color: white;
      border-radius: 6px;
      font-size: 14px;
    }

    button:hover {
      background: #555;
    }

    /* Контейнерът, в който стои самият PDF */
    #viewer {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden; /* Забраняваме всякакъв скрол */
      background: #222;
      position: relative;
      padding: 10px; /* Малко въздух около страницата */
      box-sizing: border-box;
    }

    canvas {
      /* Сянка за красота, за да изглежда като лист хартия */
      box-shadow: 0 0 20px rgba(0,0,0,0.8); 
    }

    #pageInfo {
      color: white;
      margin: 0 10px;
      min-width: 80px;
      text-align: center;
    }

    #error-msg {
      color: #ff5555;
      position: absolute;
      text-align: center;
      padding: 20px;
      display: none;
    }
  </style>
</head>

<body>

<div id="controls">
  <button onclick="prevPage()">⬅ Назад</button>
  <span id="pageInfo">Зареждане...</span>
  <button onclick="nextPage()">Напред ➡</button>
  <button onclick="toggleFull()">Цял екран</button>
</div>

<div id="viewer">
  <div id="error-msg">Не мога да заредя PDF файла.<br>Ако си на компютъра си (file:///), браузърът го блокира. Качи го в GitHub!</div>
  <canvas id="pdf-canvas"></canvas>
</div>

<script>
const url = "Portfolio-Savova-Diana-2026.pdf";

let pdfDoc = null;
let pageNum = 1;

const canvas = document.getElementById("pdf-canvas");
const ctx = canvas.getContext("2d");

// 🔥 prevent PDF.js from resetting page on navigation
const loadingTask = pdfjsLib.getDocument({
  url: url,
  disableAutoFetch: false
});

loadingTask.promise.then(pdf => {
  pdfDoc = pdf;
  renderPage(pageNum);
});

// 📏 auto-fit scale (IMPORTANT FIX)
function getScale(page) {
  const viewport = page.getViewport({ scale: 1 });

  const maxWidth = window.innerWidth;
  const maxHeight = window.innerHeight - 60; // controls bar

  return Math.min(
    maxWidth / viewport.width,
    maxHeight / viewport.height
  );
}

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    const scale = getScale(page);
    const viewport = page.getViewport({ scale });

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    const renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };

    page.render(renderContext);

    document.getElementById("pageInfo").textContent =
      `Page ${num} / ${pdfDoc.numPages}`;

    pageNum = num;
  });
}

function nextPage() {
  if (pageNum >= pdfDoc.numPages) return;
  renderPage(pageNum + 1);
}

function prevPage() {
  if (pageNum <= 1) return;
  renderPage(pageNum - 1);
}

// 🔥 FIX 2: external links open in NEW TAB
pdfjsLib.getDocument({
  url: url,
  externalLinkTarget: pdfjsLib.LinkTarget.BLANK,
  ignoreDestinationZoom: true
});

// 🔥 keep page on resize (no reset)
window.addEventListener("resize", () => {
  renderPage(pageNum);
});
</script>

</body>
</html>
