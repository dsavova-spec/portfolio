<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Viewer</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #222;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #test-bar {
      padding: 15px;
      background: #333;
    }

    #test-bar a {
      color: #4CAF50;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      border: 1px solid #4CAF50;
      padding: 8px 15px;
      border-radius: 5px;
    }

    #test-bar a:hover {
      background: #4CAF50;
      color: white;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <div id="test-bar">
    Ако отдолу екранът е сив, натисни тук: 
    <a href="Portfolio-Savova-Diana-2026.pdf" target="_blank">👉 ОТВОРИ ФАЙЛА ДИРЕКТНО</a>
  </div>

  <iframe src="Portfolio-Savova-Diana-2026.pdf#toolbar=0&navpanes=0&view=Fit"></iframe>

</body>
</html>
