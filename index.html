<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #controls {
      background: #1c1c1c;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
      color: white;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #333;
      color: white;
    }

    button:hover {
      background: #555;
    }

    #viewer {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #222;
      overflow: auto;
    }

    canvas {
      display: block;
    }

    #pageInfo {
      margin: 0 10px;
    }
  </style>
</head>

<body>

<div id="controls">
  <button onclick="prevPage()">⬅ Назад</button>
  <span id="pageInfo">Loading...</span>
  <button onclick="nextPage()">Напред ➡</button>
  <button onclick="toggleFull()">Fullscreen</button>
</div>

<div id="viewer">
  <canvas id="pdf-canvas"></canvas>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const url = "Portfolio-Savova-Diana-2026.pdf";

let pdfDoc = null;
let pageNum = 1;

const canvas = document.getElementById("pdf-canvas");
const ctx = canvas.getContext("2d");

// 🔥 IMPORTANT: full link + navigation support
const loadingTask = pdfjsLib.getDocument({
  url: url,
  externalLinkTarget: pdfjsLib.LinkTarget.BLANK
});

loadingTask.promise.then(pdf => {
  pdfDoc = pdf;
  renderPage(pageNum);
});

// 🔥 CRITICAL FIX: LinkService (handles internal links)
const linkService = new pdfjsLib.PDFLinkService();

function getScale(page) {
  const viewport = page.getViewport({ scale: 1 });

  const maxWidth = window.innerWidth;
  const maxHeight = window.innerHeight - 60;

  return Math.min(
    maxWidth / viewport.width,
    maxHeight / viewport.height
  );
}

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    const scale = getScale(page);
    const viewport = page.getViewport({ scale });

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    const renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };

    page.render(renderContext);

    // 🔥 THIS enables internal navigation
    linkService.setDocument(pdfDoc);
    linkService.setViewer({
      scrollPageIntoView: ({ pageNumber }) => {
        renderPage(pageNumber);
      }
    });

    document.getElementById("pageInfo").textContent =
      `Page ${num} / ${pdfDoc.numPages}`;

    pageNum = num;
  });
}

function nextPage() {
  if (pageNum >= pdfDoc.numPages) return;
  renderPage(pageNum + 1);
}

function prevPage() {
  if (pageNum <= 1) return;
  renderPage(pageNum - 1);
}

function toggleFull() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

window.addEventListener("resize", () => {
  renderPage(pageNum);
});
</script>

</body>
</html>
