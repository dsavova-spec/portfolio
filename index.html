<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Портфолио на Диана Савова</title>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #controls {
      background: #1c1c1c;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      border: none;
      background: #333;
      color: white;
      border-radius: 6px;
    }

    button:hover {
      background: #555;
    }

    #viewer {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto; /* Позволява скрол само на самото платно, ако е много голямо */
      background: #222;
      position: relative;
    }

    canvas {
      max-width: 100%;
      height: auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.5); /* Малка сянка за красота */
    }

    #pageInfo {
      color: white;
      margin: 0 10px;
      min-width: 80px;
      text-align: center;
    }

    #error-msg {
      color: #ff5555;
      position: absolute;
      text-align: center;
      padding: 20px;
      display: none; /* Скрито по подразбиране */
    }
  </style>
</head>

<body>

<div id="controls">
  <button onclick="prevPage()">⬅ Назад</button>
  <span id="pageInfo">Зареждане...</span>
  <button onclick="nextPage()">Напред ➡</button>
  <button onclick="toggleFull()">На цял екран</button>
</div>

<div id="viewer">
  <div id="error-msg">Не мога да заредя PDF файла.<br>Ако си на компютъра си (file:///), браузърът го блокира. Качи го в GitHub!</div>
  <canvas id="pdf-canvas"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
// 1. ЗАДЪЛЖИТЕЛНО: Указваме къде се намира Worker скрипта!
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const url = "Portfolio-Savova-Diana-2026.pdf";

let pdfDoc = null;
let pageNum = 1;
let scale = 1.5; // Можеш да промениш това, ако страницата ти се струва размазана (напр. на 2.0)

const canvas = document.getElementById("pdf-canvas");
const ctx = canvas.getContext("2d");
const pageInfo = document.getElementById("pageInfo");
const errorMsg = document.getElementById("error-msg");

// 2. Опитваме да заредим документа, като добавяме .catch() за улавяне на грешки
pdfjsLib.getDocument(url).promise.then(pdf => {
  pdfDoc = pdf;
  pageInfo.textContent = `1 / ${pdf.numPages}`;
  renderPage(pageNum);
}).catch(err => {
  console.error("Грешка при зареждане на PDF:", err);
  pageInfo.textContent = "Грешка";
  errorMsg.style.display = "block";
});

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {
    const viewport = page.getViewport({ scale: scale });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    const renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };

    page.render(renderContext);
    pageInfo.textContent = `${num} / ${pdfDoc.numPages}`;
  });
}

function nextPage() {
  if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
  pageNum++;
  renderPage(pageNum);
}

function prevPage() {
  if (!pdfDoc || pageNum <= 1) return;
  pageNum--;
  renderPage(pageNum);
}

function toggleFull() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
</script>

</body>
</html>
