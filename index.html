<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #controls {
      background: #1c1c1c;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
      color: white;
      z-index: 10;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #333;
      color: white;
    }

    button:hover {
      background: #555;
    }

    #viewer {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #222;
      overflow: auto;
    }

    canvas {
      display: block;
    }

    /* 🔥 annotation layer MUST exist */
    #annotation-layer {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #pageInfo {
      margin: 0 10px;
    }
  </style>
</head>

<body>

<div id="controls">
  <button onclick="prevPage()">⬅ Назад</button>
  <span id="pageInfo">Loading...</span>
  <button onclick="nextPage()">Напред ➡</button>
  <button onclick="toggleFull()">Fullscreen</button>
</div>

<div id="viewer">
  <canvas id="pdf-canvas"></canvas>
  <div id="annotation-layer"></div>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const url = "Portfolio-Savova-Diana-2026.pdf";

let pdfDoc = null;
let pageNum = 1;

const canvas = document.getElementById("pdf-canvas");
const ctx = canvas.getContext("2d");
const annotationLayer = document.getElementById("annotation-layer");

// 🔥 REQUIRED: link service for internal navigation
const linkService = new pdfjsLib.PDFLinkService();

const loadingTask = pdfjsLib.getDocument({
  url: url,
  externalLinkTarget: pdfjsLib.LinkTarget.BLANK
});

loadingTask.promise.then(pdf => {
  pdfDoc = pdf;
  linkService.setDocument(pdf);
  renderPage(pageNum);
});

function getScale(page) {
  const viewport = page.getViewport({ scale: 1 });

  const maxWidth = window.innerWidth;
  const maxHeight = window.innerHeight - 60;

  return Math.min(
    maxWidth / viewport.width,
    maxHeight / viewport.height
  );
}

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    const scale = getScale(page);
    const viewport = page.getViewport({ scale });

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    // 🔥 render PDF page
    page.render({
      canvasContext: ctx,
      viewport: viewport
    });

    // 🔥 CLEAR annotation layer
    annotationLayer.innerHTML = "";

    // 🔥 THIS is what enables internal links
    page.getAnnotations().then(annotations => {

      const annotationViewport = viewport;

      annotations.forEach(ann => {

        if (!ann.dest && !ann.url) return;

        const link = document.createElement("a");

        // external link
        if (ann.url) {
          link.href = ann.url;
          link.target = "_blank";
        }

        // internal link (THIS IS THE IMPORTANT PART)
        if (ann.dest) {
          link.href = "#";
          link.onclick = (e) => {
            e.preventDefault();

            pdfDoc.getDestination(ann.dest).then(dest => {
              pdfDoc.getPageIndex(dest[0]).then(pageIndex => {
                renderPage(pageIndex + 1);
              });
            });
          };
        }

        const rect = annotationViewport.convertToViewportRectangle(ann.rect);

        const x = Math.min(rect[0], rect[2]);
        const y = Math.min(rect[1], rect[3]);
        const w = Math.abs(rect[0] - rect[2]);
        const h = Math.abs(rect[1] - rect[3]);

        link.style.position = "absolute";
        link.style.left = x + "px";
        link.style.top = y + "px";
        link.style.width = w + "px";
        link.style.height = h + "px";
        link.style.cursor = "pointer";

        annotationLayer.appendChild(link);
      });
    });

    document.getElementById("pageInfo").textContent =
      `Page ${num} / ${pdfDoc.numPages}`;

    pageNum = num;
  });
}

function nextPage() {
  if (pageNum >= pdfDoc.numPages) return;
  renderPage(pageNum + 1);
}

function prevPage() {
  if (pageNum <= 1) return;
  renderPage(pageNum - 1);
}

function toggleFull() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

window.addEventListener("resize", () => {
  renderPage(pageNum);
});
</script>

</body>
</html>
