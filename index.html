<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Diana Savova</title>
    <style>
        /* Премахваме абсолютно всички празни полета и забраняваме скрола на самия уебсайт */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            background-color: #222; /* Тъмен фон */
        }

        /* Заковаваме PDF-а абсолютно към ръбовете на екрана.
           vw = 100% от ширината на екрана
           vh = 100% от височината на екрана
        */
        embed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <embed src="Portfolio-Savova-Diana-2026.pdf#toolbar=0&navpanes=0&scrollbar=0&view=Fit&pageLayout=SinglePage" type="application/pdf">

</body>
</html>
